<!-- Media Modals -->
{% for item in site.data.media %}
    <div class="portfolio-modal modal fade" id="mediaModal{{ item.modal-id }}" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-content">
            <div class="close-modal" data-dismiss="modal">
                <div class="lr">
                    <div class="rl">
                    </div>
                </div>
            </div>
            <div class="container">
                <div class="row">
                    <div class="col-lg-8 col-lg-offset-2">
                        <div class="modal-body">
                            <h2>{{ item.title }}</h2>
                            <hr class="star-primary">
                            <img src="{{ site.baseurl }}/img/{{ item.img | replace: ' ', '%20' }}" class="img-responsive img-centered" alt="{{ item.alt }}">
                            <p class="text-muted media-modal-subtitle">{{ item.subtitle }}</p>
                            <p>{{ item.description }}</p>
                            <button type="button" class="btn btn-default" data-dismiss="modal"><i class="fa fa-times"></i> Close</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endfor %}
