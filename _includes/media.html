<!-- Media Section -->
    <section id="media" class="bg-light-gray">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 text-center">
                    <h2 class="section-heading">Media</h2>
                    <h3 class="section-subheading text-muted">Honors, press, and highlights.</h3>
                </div>
            </div>
            <div class="row">
                {% for item in site.data.media %}
                <div class="col-md-4 col-sm-6 portfolio-item">
                    <a href="#mediaModal{{ item.modal-id }}" class="portfolio-link" data-toggle="modal">
                        <div class="portfolio-hover">
                            <div class="portfolio-hover-content">
                                <i class="fa fa-plus fa-3x"></i>
                            </div>
                        </div>
                        <img src="{{ site.baseurl }}/img/{{ item.thumbnail | replace: ' ', '%20' }}" class="img-responsive img-centered" alt="{{ item.alt }}">
                    </a>
                    <div class="portfolio-caption">
                        <h4>{{ item.title }}</h4>
                        <p class="text-muted">{{ item.subtitle }}</p>
                    </div>
                </div>
                {% endfor %}
                {% for i in (2..3) %}
                <div class="col-md-4 col-sm-6 portfolio-item">
                    <div class="portfolio-link media-placeholder">
                        <div class="portfolio-hover">
                            <div class="portfolio-hover-content">
                                <i class="fa fa-plus fa-3x"></i>
                            </div>
                        </div>
                        <div class="media-placeholder-box" aria-hidden="true"></div>
                    </div>
                    <div class="portfolio-caption">
                        <h4>Media {{ i }}</h4>
                        <p class="text-muted">Placeholder</p>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </section>
